<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEFE Interface - Ollama Client</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #e0e0e0; max-width: 800px; margin: 0 auto; padding: 20px; }
        #chat-container { border: 1px solid #333; background: #252525; padding: 20px; height: 60vh; overflow-y: auto; border-radius: 8px; margin-bottom: 20px; }
        .message { margin: 10px 0; padding: 10px; border-radius: 5px; max-width: 80%; }
        .user { background: #0056b3; margin-left: auto; color: white; }
        .bot { background: #333; border: 1px solid #444; color: #ddd; }
        .error { color: #ff6b6b; background: #3d1a1a; border: 1px solid #ff6b6b; }
        #input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; }
        button { padding: 12px 24px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>JEFE Interface</h1>
    <div id="chat-container">
        <div class="message bot">System: Ready. Connected to Ollama via ngrok.</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" id="send-btn">Send</button>
    </div>

    <script>
        const CONFIG = {
            // FIXED: Added /api/generate to the endpoint
            API_URL: 'https://toya-unoperatable-kathaleen.ngrok-free.dev',
            MODEL: 'llama3'
        };

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const btn = document.getElementById('send-btn');
            const chat = document.getElementById('chat-container');
            const text = input.value.trim();

            if (!text) return;

            appendMessage(text, 'user');
            input.value = '';
            btn.disabled = true;
            
            const botMsgDiv = appendMessage('Thinking...', 'bot');

            try {
                const response = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': '69420' 
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODEL,
                        prompt: text,
                        stream: false 
                    })
                });

                if (!response.ok) {
                    throw new Error(`Server Error: ${response.status}`);
                }

                const data = await response.json();
                botMsgDiv.innerText = data.response;

            } catch (error) {
                console.error('Fetch error:', error);
                botMsgDiv.className += ' error';
                botMsgDiv.innerHTML = `<strong>CONNECTION FAILED</strong><br>${error.message}`;
            } finally {
                btn.disabled = false;
                chat.scrollTop = chat.scrollHeight;
            }
        }

        function appendMessage(text, sender) {
            const chat = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
