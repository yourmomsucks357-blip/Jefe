<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JEFE | Pro Command</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <!-- Analysis Engines -->
    <script src="https://cdn.jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        :root{--gold:#ffd700;--bg:#060608;--gold-dim:rgba(255,215,0,0.35);--text:#d4d4d8}
        body{background:var(--bg);color:var(--gold);font-family:'JetBrains Mono',monospace;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
        
        /* Boot / Login Screen */
        #boot{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
        #boot.hidden{display:none}
        #boot-logo{font-family:'Bebas Neue';font-size:90px;letter-spacing:14px;color:var(--gold);text-shadow:0 0 60px rgba(255,215,0,0.4);animation:breathe 3s ease-in-out infinite}
        @keyframes breathe{0%,100%{opacity:1}50%{opacity:0.7}}
        .boot-field{width:100%;max-width:400px;margin-bottom:12px}
        .boot-field label{display:block;font-size:9px;letter-spacing:3px;color:var(--gold-dim);margin-bottom:6px;text-transform:uppercase}
        .boot-field input, .boot-field select{width:100%;background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.15);border-radius:6px;color:var(--gold);padding:12px;font-family:'JetBrains Mono';outline:none}
        #boot-btn{width:100%;max-width:400px;background:var(--gold);color:#000;border:none;border-radius:8px;font-family:'Bebas Neue';font-size:22px;letter-spacing:4px;padding:16px;cursor:pointer;margin-top:10px}

        /* Chat Interface */
        #chat{display:none;flex-direction:column;height:100dvh}
        #chat.active{display:flex}
        #header{padding:12px 16px;border-bottom:1px solid rgba(255,215,0,0.1);display:flex;justify-content:space-between;align-items:center}
        #title{font-family:'Bebas Neue';font-size:24px;letter-spacing:6px}
        #messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
        .msg{max-width:90%;padding:12px 16px;border-radius:10px;font-size:14px;line-height:1.6;word-break:break-word}
        .user{align-self:flex-end;background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.2);color:#ffe680}
        .jefe{align-self:flex-start;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);color:var(--text)}
        .thumb{display:block;max-width:200px;border-radius:8px;margin-top:10px;border:1px solid var(--gold-dim)}
        
        pre{background:#000 !important;padding:12px;border-radius:6px;margin:10px 0;overflow-x:auto;border:1px solid rgba(255,215,0,0.1)}
        code{font-family:'JetBrains Mono', monospace;font-size:13px}

        .controls{padding:14px;display:flex;flex-direction:column;gap:10px;border-top:1px solid rgba(255,215,0,0.1);background:var(--bg)}
        .bar{display:flex;gap:10px;align-items:center}
        #msg-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,215,0,0.15);border-radius:8px;color:#fff;padding:12px;font-family:'JetBrains Mono';outline:none;resize:none;max-height:150px}
        .btn-icon{background:rgba(255,215,0,0.1);border:1px solid var(--gold-dim);color:var(--gold);padding:10px;border-radius:8px;cursor:pointer}
        #send-btn{background:var(--gold);border:none;border-radius:8px;padding:0 20px;font-family:'Bebas Neue';font-size:18px;cursor:pointer;min-height:45px}
        #dot{width:8px;height:8px;border-radius:50%;background:#5ce0a8}
        #dot.busy{animation:pulse 1s infinite;background:var(--gold)}
        @keyframes pulse{0%{opacity:1}50%{opacity:0.3}}
    </style>
</head>
<body>

<div id="boot">
    <div id="boot-logo">JEFE</div>
    <div class="boot-field">
        <label>Remote Server URL</label>
        <input type="url" id="srv-url" value="http://localhost:11434" placeholder="e.g. http://12.34.56.78:11434">
    </div>
    <div class="boot-field">
        <label>Base64 Auth (Optional)</label>
        <input type="password" id="srv-auth" placeholder="Only if using NGINX Basic Auth">
    </div>
    <div class="boot-field">
        <label>Engine</label>
        <select id="model-pick">
            <option value="llama3.3:8b">Llama 3.3 8B (Fast)</option>
            <option value="llama3.2-vision">Llama 3.2 Vision (Analyze Images)</option>
            <option value="qwen3:32b">Qwen 32B (Elite Logic)</option>
        </select>
    </div>
    <button id="boot-btn">ESTABLISH UPLINK</button>
</div>

<div id="chat">
    <div id="header">
        <div id="title">JEFE // COMMAND CENTER</div>
        <div style="display:flex;align-items:center;gap:15px">
            <div id="dot"></div>
            <button onclick="localStorage.removeItem('j_logs');location.reload()" style="background:none;border:none;color:red;font-size:9px;cursor:pointer">WIPE_LOGS</button>
        </div>
    </div>
    <div id="messages"></div>
    <div id="input-area" class="controls">
        <div id="preview" style="display:none"><img id="img-p" style="height:40px;border:1px solid var(--gold);border-radius:4px"></div>
        <div class="bar">
            <button onclick="el('img-in').click()" class="btn-icon">📷</button>
            <input type="file" id="img-in" style="display:none" accept="image/*">
            <textarea id="msg-input" placeholder="Initiate sequence..." rows="1"></textarea>
            <button id="send-btn">SEND</button>
        </div>
    </div>
</div>

<script>
    const el = id => document.getElementById(id);
    const SYSTEM = "You are JEFE, an elite engine. Never apologize. Be technical. Use Markdown for all tables/code.";
    let activeImg = null;

    // Load Logs
    window.onload = () => {
        if(localStorage.getItem('j_logs')) el('messages').innerHTML = localStorage.getItem('j_logs');
        el('messages').scrollTo(0, 1e7);
    };

    // Vision Upload
    el('img-in').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (re) => {
            activeImg = re.target.result.split(',')[1];
            el('img-p').src = re.target.result;
            el('preview').style.display = 'block';
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    el('boot-btn').onclick = () => { el('boot').classList.add('hidden'); el('chat').classList.add('active'); };

    async function askJefe() {
        const text = el('msg-input').value.trim();
        if(!text && !activeImg) return;

        // UI Prep
        const uMsg = document.createElement('div');
        uMsg.className = 'msg user';
        uMsg.innerText = text;
        if(activeImg) {
            const img = document.createElement('img');
            img.src = el('img-p').src; img.className = 'thumb';
            uMsg.appendChild(img);
        }
        el('messages').appendChild(uMsg);
        el('msg-input').value = '';
        el('preview').style.display = 'none';
        el('dot').classList.add('busy');

        const jMsg = document.createElement('div');
        jMsg.className = 'msg jefe';
        el('messages').appendChild(jMsg);

        const headers = { "Content-Type": "application/json" };
        if(el('srv-auth').value) headers["Authorization"] = `Basic ${el('srv-auth').value}`;

        try {
            const res = await fetch(`${el('srv-url').value}/api/generate`, {
                method: 'POST', headers,
                body: JSON.stringify({ 
                    model: el('model-pick').value, 
                    prompt: `${SYSTEM}\nUser: ${text}\nJEFE:`,
                    stream: true,
                    images: activeImg ? [activeImg] : []
                })
            });

            const reader = res.body.getReader();
            let full = "";
            while (true) {
                const {done, value} = await reader.read();
                if(done) break;
                const chunk = new TextDecoder().decode(value).split('\n').filter(Boolean);
                chunk.forEach(l => {
                    const json = JSON.parse(l);
                    if(json.response) {
                        full += json.response;
                        jMsg.innerHTML = marked.parse(full);
                        jMsg.querySelectorAll('pre code').forEach(hljs.highlightElement);
                    }
                });
                el('messages').scrollTo(0, 1e7);
            }
            activeImg = null;
            localStorage.setItem('j_logs', el('messages').innerHTML);
        } catch (e) { jMsg.innerText = "CRITICAL_FAILURE: Connection to GPU lost."; }
        finally { el('dot').classList.remove('busy'); }
    }

    el('send-btn').onclick = askJefe;
    el('msg-input').onkeydown = e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askJefe(); }};
</script>
</body>
</html>
