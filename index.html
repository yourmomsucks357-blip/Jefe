<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>JEFE SHIELD</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--green:#00e676;--green-dim:rgba(0,230,118,0.3);--red:#ff1744;--gold:#ffd700;--bg:#060608;--surface:#0c0c10;--border:rgba(0,230,118,0.12);--text:#d4d4d8;--text-dim:rgba(255,255,255,0.25)}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--green);font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;height:100dvh}
#header{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#title{font-family:'Bebas Neue';font-size:24px;letter-spacing:5px;color:var(--green);text-shadow:0 0 20px rgba(0,230,118,0.3)}
#subtitle{font-size:8px;letter-spacing:3px;color:var(--green-dim)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 10px var(--green)}50%{box-shadow:0 0 20px var(--green),0 0 40px rgba(0,230,118,0.3)}}
#main{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px;-webkit-overflow-scrolling:touch}
.tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.tab{flex:1;padding:10px;text-align:center;font-size:10px;letter-spacing:2px;cursor:pointer;background:transparent;color:var(--green-dim);border:none;font-family:'JetBrains Mono';transition:all .15s}
.tab.active{background:rgba(0,230,118,0.1);color:var(--green)}
.panel{display:none;flex-direction:column;gap:14px}
.panel.active{display:flex}
textarea, input{width:100%;background:rgba(0,230,118,0.04);border:1px solid rgba(0,230,118,0.2);border-radius:8px;color:#fff;padding:14px;font-family:'JetBrains Mono';font-size:13px;outline:none;resize:none}
textarea:focus, input:focus{border-color:rgba(0,230,118,0.5)}
.action-btn{width:100%;background:var(--green);border:none;border-radius:8px;color:#000;font-family:'Bebas Neue';font-size:18px;letter-spacing:3px;padding:14px;cursor:pointer;transition:all .15s}
.action-btn:active{transform:scale(0.97);opacity:0.8}
.result-card{background:rgba(0,230,118,0.03);border:1px solid var(--border);border-radius:8px;padding:14px}
.result-label{font-size:9px;letter-spacing:2px;color:var(--green-dim);margin-bottom:6px;text-transform:uppercase}
.result-value{font-size:12px;color:var(--text);line-height:1.6;word-break:break-all}
.ip-display{font-family:'Bebas Neue';font-size:36px;letter-spacing:3px;text-align:center;padding:20px;color:var(--green)}
.info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px}
.label{color:var(--green-dim)}
</style>
</head>
<body>

<div id="header">
  <div>
    <div id="title">JEFE SHIELD</div>
    <div id="subtitle">IP SCRAMBLER · LINK PROTECTOR</div>
  </div>
  <div class="status-dot"></div>
</div>

<div id="main">
  <div class="tabs">
    <button class="tab active" onclick="showPanel('proxy')">SCRAMBLER</button>
    <button class="tab" onclick="showPanel('ip')">MY IP</button>
  </div>

  <div class="panel active" id="panel-proxy">
    <div style="font-size:11px;color:var(--text-dim)">Enter URL to mask your origin. Target sees proxy node IP.</div>
    <input type="url" id="proxy-url" placeholder="https://target-site.com">
    <button class="action-btn" onclick="proxyBrowse()">ACTIVATE SCRAMBLER</button>
    <div id="proxy-results"></div>
  </div>

  <div class="panel" id="panel-ip">
    <div id="ip-info">
        <div style="text-align:center;font-size:10px;letter-spacing:3px;color:var(--green-dim)">CURRENT VISIBLE IP</div>
        <div class="ip-display" id="display-ip">...</div>
    </div>
    <div id="ip-details"></div>
    <button class="action-btn" onclick="checkIP()">REFRESH STATUS</button>
  </div>
</div>

<script>
function showPanel(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  event.target.classList.add('active');
  if(name==='ip')checkIP();
}

function proxyBrowse(){
  const url = document.getElementById('proxy-url').value.trim();
  const results = document.getElementById('proxy-results');
  
  if(!url){
    results.innerHTML = '<div class="result-card"><div class="result-value" style="color:var(--red)">MISSING URL</div></div>';
    return;
  }

  results.innerHTML = `
    <div class="result-card">
      <div class="result-label">SCRAMBLER STATUS</div>
      <div class="result-value" style="color:var(--green)">ROUTING THROUGH PROXY NODE...</div>
      <div class="result-value" style="color:var(--gold); font-size:10px">ORIGIN MASKED</div>
    </div>`;

  const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
  window.open(proxyUrl, '_blank');
}

async function checkIP(){
  const display = document.getElementById('display-ip');
  const details = document.getElementById('ip-details');
  display.innerText = 'SCANNING...';
  
  try{
    const res = await fetch('https://ipapi.co/json/');
    const data = await res.json();
    display.innerText = data.ip;
    details.innerHTML = `
      <div class="result-card">
        <div class="result-label">EXPOSED DATA</div>
        <div class="info-row"><span class="label">LOCATION</span><span>${data.city}, ${data.region}</span></div>
        <div class="info-row"><span class="label">ISP</span><span>${data.org}</span></div>
      </div>`;
  } catch(e) {
    display.innerText = 'ERROR';
  }
}

checkIP();
</script>

</body>
</html>
